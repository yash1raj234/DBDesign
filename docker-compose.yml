version: "3.9"

# ── DBDesign Platform — local development stack ──────────────────────────────
# Services: PostgreSQL 16, Redis 7, FastAPI backend, Next.js frontend
#
# Usage:
#   cp .env.example .env          # fill in secrets
#   docker compose up --build     # first run
#   docker compose up             # subsequent runs
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: dbdesign_postgres
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-dbdesign}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dbdesign_secret}
      POSTGRES_DB:       ${POSTGRES_DB:-dbdesign}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dbdesign}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: dbdesign_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: dbdesign_backend
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app          # live-reload on source changes
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # ── Next.js frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: dbdesign_frontend
    env_file: .env
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules       # prevent host node_modules from being mounted
      - /app/.next
    depends_on:
      - backend
    command: npm run dev
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

# Nginx reverse proxy — production deployment (Railway / self-hosted)
# Fronts both the Next.js frontend (port 3000) and FastAPI backend (port 8000).

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain application/json application/javascript text/css;

    upstream frontend {
        server frontend:3000;
    }

    upstream backend {
        server backend:8000;
    }

    server {
        listen 80;
        server_name _;

        # Route /api/* to FastAPI
        location /api/ {
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;    # allow time for Gemini calls
        }

        # Route /docs and /redoc to FastAPI (debug only — disable in prod)
        location ~ ^/(docs|redoc|openapi.json) {
            proxy_pass http://backend;
        }

        # Everything else → Next.js
        location / {
            proxy_pass         http://frontend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";  # WebSocket for HMR
        }
    }
}

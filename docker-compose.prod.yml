version: "3.9"

# ── DBDesign Platform — production stack ─────────────────────────────────────
# Services: db (Postgres 16), redis, api (FastAPI), web (Next.js), nginx
#
# Pre-flight:
#   cp .env.example .env        # fill ALL production values
#   docker compose -f docker-compose.prod.yml up --build -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: dbdesign_db
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-dbdesign}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB:       ${POSTGRES_DB:-dbdesign}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dbdesign}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    # Not exposed externally — only reachable by api service on the docker network

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: dbdesign_redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    # Not exposed externally

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: dbdesign_api
    env_file: .env
    environment:
      # Override dev defaults with explicit production values
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    # Not exposed externally — nginx proxies /api/* to this service

  # ── Next.js frontend ────────────────────────────────────────────────────────
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        # Baked into the JS bundle at build time by Next.js
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL must be set in .env}
    container_name: dbdesign_web
    environment:
      NODE_ENV: production
    depends_on:
      - api
    restart: always
    # Not exposed externally — nginx proxies / to this service

  # ── Nginx reverse proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: dbdesign_nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
    restart: always

volumes:
  postgres_data:
  redis_data:
